<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>demo: :attr</title>
<style>
  body { margin: 0; padding: 16px; font: 14px/1.5 -apple-system, sans-serif; background: #f9fafb; }
  .demo-card { background: #fff; border-radius: 8px; padding: 16px; box-shadow: 0 1px 3px #0001; max-width: 400px; margin: 0 auto; }
  button { padding: 8px 16px; border: 0; border-radius: 6px; color: #fff; cursor: pointer; font: inherit; }
  .box { width: 100%; height: 60px; border-radius: 6px; margin: 12px 0; transition: all 0.3s; }
  .ctrl { display: flex; gap: 8px; margin: 8px 0; align-items: center; }
  .ctrl label { font-size: 13px; color: #6b7280; }
  input[type=range] { flex: 1; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; background: #e5e7eb; color: #374151; }
  .badge.success { background: #d1fae5; color: #065f46; }
  .badge.warn    { background: #fef3c7; color: #92400e; }
  .badge.error   { background: #fee2e2; color: #991b1b; }
</style>
</head>
<body>

<div class="demo-card">
  <!-- :style 动态 -->
  <div class="box" :style="{ background: color, opacity: opacity, width: width + '%' }"></div>

  <!-- :class 三种语法 -->
  <div class="ctrl">
    <span :class="['badge', power ? 'success' : 'error']">
      {{ power ? '已开启' : '已关闭' }}
    </span>
    <span :class="{ badge: true, success: temp > 20 && temp < 28, warn: temp <= 20 || temp >= 28, error: temp > 30 }">
      {{ temp > 28 ? '太热' : temp > 20 ? '适宜' : '太冷' }}
    </span>
  </div>

  <!-- 控件 -->
  <div class="ctrl"><label>颜色</label>
    <input model="color" type="color" style="width:60px">
  </div>
  <div class="ctrl"><label>宽度</label>
    <input type="range" model="width" min="10" max="100">
  </div>
  <div class="ctrl"><label>透明</label>
    <input type="range" model="opacity" min="0" max="100">
  </div>
  <div class="ctrl"><label>温度</label>
    <input type="number" model="temp">
    <label><input model="power" type="checkbox"> power</label>
  </div>

  <!-- :disabled -->
  <button :disabled="busy" @click="toggle()">
    {{ power ? '关闭' : '开启' }}
  </button>
</div>

<script src="../../src/novajs.min.js"></script>
<script>
  nova({
      data: { color: '#10b981', width: 50, opacity: 100, temp: 24, power: false, busy: false }, funcs: { toggle () {
      this.power = !this.power
      this.busy = true
      setTimeout(() => { this.busy = false }, 800)
    } }
  })
</script>

</body>
</html>
